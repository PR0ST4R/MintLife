<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fake Chat — MintLife</title>
<link rel="icon" type="image/svg+xml" href="logo.png" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="tool.css" />
<link rel="stylesheet" href="chat-platforms.css" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <img src="logo.png" alt="MintLife" />
      <span>MintLife</span>
    </a>
    <div class="nav-actions">
      <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
      </button>
      <div id="navAccountSlot"></div>
    </div>
  </div>
</nav>

<main class="page">
  <div class="wrap">
    <div class="tool-header">
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to MintLife
      </a>
      <div class="tool-title">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </div>
        <h1>Fake Chat</h1>
      </div>
      <p class="desc">Build a realistic-looking conversation for any platform. Edit names, messages, timestamps and photos, then download it as a clean PNG — no watermark.</p>
    </div>

    <div class="tool-body">

      <!-- LEFT: editor -->
      <div class="panel">
        <h3>Platform</h3>
        <div class="platform-grid" id="platformGrid"></div>

        <h3>Conversation title</h3>
        <div class="field">
          <input type="text" id="chatTitle" placeholder="e.g. Mom" value="Mom" />
        </div>
        <div class="field">
          <label>Subtitle / status</label>
          <input type="text" id="chatSubtitle" placeholder="e.g. online" value="online" />
        </div>
        <div class="field">
          <label>Header photo URL (optional)</label>
          <input type="text" id="chatAvatar" placeholder="https://..." />
        </div>

        <h3 style="margin-top:24px;">Messages</h3>
        <div class="msg-list" id="msgList"></div>
        <button class="btn btn-secondary btn-sm" id="addMsgBtn" style="width:100%;">+ Add message</button>
      </div>

      <!-- RIGHT: preview -->
      <div class="preview-wrap">
        <div class="phone-frame">
          <div id="chatCanvasHost"></div>
        </div>
        <div class="preview-actions">
          <button class="btn btn-primary" id="downloadBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Download PNG
          </button>
          <button class="btn btn-secondary" id="resetBtn">Reset</button>
        </div>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="wrap">A peaceful corner of the internet — MintLife</div>
  </footer>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="supabase.js"></script>
<script src="identity.js"></script>
<script src="theme.js"></script>
<script src="toast.js"></script>
<script src="loader.js"></script>
<script src="auth.js"></script>
<script src="storage.js"></script>
<script src="nav.js"></script>
<script src="chat-renderer.js"></script>
<script src="fake-chat.js"></script>
</body>
</html>
