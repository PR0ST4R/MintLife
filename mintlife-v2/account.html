<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Account — MintLife</title>
<link rel="icon" type="image/png" href="logo.png" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="tool.css" />
<style>
.acct-wrap{ max-width:520px; margin:0 auto; padding:36px 0 70px; }
.acct-card{ padding:28px; }
.acct-avatar{ width:72px;height:72px;border-radius:50%;margin:0 auto 14px;object-fit:cover;display:block; }
.acct-avatar-fallback{ width:72px;height:72px;border-radius:50%;margin:0 auto 14px;background:var(--mint);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.6rem;font-weight:700; }
.acct-name{ font-family:var(--font-display);font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:2px; }
.acct-sub{ text-align:center;color:var(--text-tertiary);font-size:0.82rem;margin-bottom:20px; }
.acct-row{ display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border);gap:10px; }
.acct-row .lbl{ font-size:0.82rem;color:var(--text-tertiary); }
.acct-row .val{ font-size:0.88rem;font-weight:600; }
.badges-row{ flex-wrap:wrap;gap:6px;align-items:flex-start; }
.badge-chip{ font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:var(--radius-pill);background:var(--mint-soft);color:var(--mint-dark);border:1px solid var(--mint-light); }

/* Share section */
.share-section{ margin-top:22px; }
.share-section h3{ font-family:var(--font-display);font-size:1rem;margin-bottom:14px; }
.share-tabs{ display:flex;gap:6px;margin-bottom:14px; }
.share-tab{ flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-soft);font-size:0.82rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all 0.12s; }
.share-tab.active{ background:var(--mint-soft);border-color:var(--mint);color:var(--mint-dark); }
.share-tab-content{ display:none; }
.share-tab-content.active{ display:block; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand"><img src="logo.png" alt="MintLife" /><span>MintLife</span></a>
    <div class="nav-actions">
      <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
      </button>
      <div id="navAccountSlot"></div>
    </div>
  </div>
</nav>
<main class="page">
  <div class="wrap acct-wrap">
    <div id="acctContent"></div>
  </div>
  <footer class="footer"><div class="wrap">A peaceful corner of the internet — MintLife</div></footer>
</main>
<script src="supabase.js"></script>
<script src="theme.js"></script>
<script src="toast.js"></script>
<script src="loader.js"></script>
<script src="identity.js"></script>
<script src="storage.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
function initials(n){ return (n||"?").split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase(); }

function renderAccount() {
  const el = document.getElementById("acctContent");
  const p = Identity.getProfile();

  if (!p || p.isGuest) {
    el.innerHTML = `<div class="card acct-card" style="text-align:center;margin-top:40px;">
      <div class="acct-avatar-fallback" style="margin:0 auto 14px;">?</div>
      <div class="acct-name">Not signed in</div>
      <p style="color:var(--text-secondary);font-size:0.86rem;margin:8px 0 20px;line-height:1.5;">Sign in to save your Mints, badges, and data.</p>
      <button class="btn btn-primary" style="width:100%;" onclick="Auth.openModal()">Sign in with Google</button>
    </div>`;
    return;
  }

  const badges = p.badges || [];
  el.innerHTML = `
    <div class="card acct-card">
      ${p.picture
        ? `<img src="${p.picture}" class="acct-avatar" referrerpolicy="no-referrer" />`
        : `<div class="acct-avatar-fallback">${initials(p.displayName||p.username)}</div>`}
      <div class="acct-name">${p.displayName || p.username}</div>
      <div class="acct-sub">${p.username ? "@"+p.username : ""} ${p.email ? "· "+p.email : ""}</div>

      <div class="acct-row"><span class="lbl">Mints</span><span class="val">🌿 ${p.mints||0}</span></div>
      <div class="acct-row"><span class="lbl">Streak</span><span class="val">🔥 ${p.streak||0} days</span></div>
      <div class="acct-row"><span class="lbl">Sign-in</span><span class="val">${p.isGoogle?"Google":"Local device"}</span></div>
      <div class="acct-row badges-row">
        <span class="lbl" style="width:100%;margin-bottom:6px;">Badges (${badges.length})</span>
        ${badges.length ? badges.map(b=>`<span class="badge-chip">🏅 ${b.label}</span>`).join("") : `<span style="font-size:0.8rem;color:var(--text-tertiary);">No badges yet — use tools to earn them!</span>`}
      </div>

      <!-- Share code section -->
      <div class="share-section">
        <h3>Shareable code</h3>
        <div class="share-tabs">
          <button class="share-tab active" id="tabCreate">Create code</button>
          <button class="share-tab" id="tabGet">Enter a code</button>
        </div>

        <div class="share-tab-content active" id="panelCreate">
          <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:12px;line-height:1.5;">
            Generate a 6-character code. Enter it on any device (web or app) to restore your Mints, badges, capsules, and all tool data. Codes expire after 30 days.
          </p>
          <button class="btn btn-primary" id="createCodeBtn" style="width:100%;">Generate my code</button>
          <div class="share-code-box" id="codeResult" style="display:none;">
            <div class="share-code-display" id="codeDisplay"></div>
            <button class="btn btn-secondary btn-sm" id="copyCodeBtn" style="width:100%;">Copy code</button>
            <p style="font-size:0.74rem;color:var(--text-tertiary);text-align:center;margin-top:8px;">Expires in 30 days</p>
          </div>
        </div>

        <div class="share-tab-content" id="panelGet">
          <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:12px;line-height:1.5;">
            Enter a code generated from another device to pull all that account's data here.
          </p>
          <div style="display:flex;gap:8px;">
            <input type="text" id="codeInput" placeholder="Enter 6-char code"
              style="flex:1;text-transform:uppercase;letter-spacing:0.12em;font-weight:700;font-family:monospace;" maxlength="6" />
            <button class="btn btn-primary" id="importCodeBtn">Import</button>
          </div>
        </div>
      </div>

      <div style="margin-top:24px;display:flex;gap:8px;flex-wrap:wrap;">
        <a href="leaderboard.html" class="btn btn-secondary btn-sm" style="flex:1;">Leaderboard</a>
        <button class="btn btn-ghost btn-sm" id="signOutBtn" style="color:#DC4C4C;">Sign out</button>
      </div>
    </div>`;

  // tabs
  document.getElementById("tabCreate").addEventListener("click", () => {
    document.getElementById("tabCreate").classList.add("active");
    document.getElementById("tabGet").classList.remove("active");
    document.getElementById("panelCreate").classList.add("active");
    document.getElementById("panelGet").classList.remove("active");
  });
  document.getElementById("tabGet").addEventListener("click", () => {
    document.getElementById("tabGet").classList.add("active");
    document.getElementById("tabCreate").classList.remove("active");
    document.getElementById("panelGet").classList.add("active");
    document.getElementById("panelCreate").classList.remove("active");
  });

  // create code
  document.getElementById("createCodeBtn").addEventListener("click", async () => {
    const btn = document.getElementById("createCodeBtn");
    btn.disabled = true; btn.textContent = "Generating...";
    try {
      const code = await Identity.createShareCode();
      document.getElementById("codeResult").style.display = "block";
      document.getElementById("codeDisplay").textContent = code;
      btn.textContent = "Regenerate";
    } catch(e) {
      Toast.show("Couldn't generate code — check your Supabase config.", {type:"warn"});
      console.error(e);
    }
    btn.disabled = false;
  });

  document.getElementById("copyCodeBtn")?.addEventListener("click", () => {
    const code = document.getElementById("codeDisplay").textContent;
    navigator.clipboard.writeText(code).then(() => Toast.show("Code copied!"));
  });

  // import code
  document.getElementById("importCodeBtn").addEventListener("click", async () => {
    const code = document.getElementById("codeInput").value.trim().toUpperCase();
    if (code.length !== 6) { Toast.show("Enter a 6-character code.", {type:"warn"}); return; }
    const btn = document.getElementById("importCodeBtn");
    btn.disabled = true; btn.textContent = "Importing...";
    try {
      const imported = await Identity.importShareCode(code);
      Toast.show(`Imported data for ${imported.displayName || imported.username} 🌿`);
      renderAccount();
    } catch(e) {
      Toast.show("Code not found or expired.", {type:"warn"});
    }
    btn.disabled = false;
  });

  // sign out
  document.getElementById("signOutBtn").addEventListener("click", () => {
    Identity.signOut();
    window.location.href = "index.html";
  });
}

document.addEventListener("DOMContentLoaded", () => {
  renderAccount();
  Identity.onChange(renderAccount);
});
</script>
</body>
</html>
