<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Roast My Website — MintLife</title>
<link rel="icon" type="image/svg+xml" href="logo.svg" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="tool.css" />
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <img src="logo.svg" alt="MintLife" />
      <span>MintLife</span>
    </a>
    <div class="nav-actions">
      <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
      </button>
      <div id="navAccountSlot"></div>
    </div>
  </div>
</nav>

<main class="page">
  <div class="wrap">
    <div class="tool-header" style="text-align:center;">
      <a href="index.html" class="back-link" style="justify-content:center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to MintLife
      </a>
      <div class="tool-title" style="justify-content:center;">
        <div class="icon-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 6 6 9 6 13a6 6 0 0 0 12 0c0-4-2-7-6-11z"/></svg>
        </div>
        <h1>Roast My Website</h1>
      </div>
      <p class="desc" style="margin-left:auto;margin-right:auto;text-align:center;">Paste a link below for a lighthearted, honest-ish review — complete with scores and a roast you can laugh at.</p>
    </div>

    <div class="url-input-row">
      <input type="url" id="urlInput" placeholder="https://example.com" />
      <button class="btn btn-primary" id="roastBtn">Roast it</button>
    </div>

    <div id="resultArea" style="display:none;">

      <div class="score-grid" id="scoreGrid"></div>

      <div class="card roast-text" id="roastText"></div>

      <div style="text-align:center;margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-secondary" id="roastAgainBtn">Roast another site</button>
      </div>
    </div>

    <div id="emptyHint" class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8 6 6 9 6 13a6 6 0 0 0 12 0c0-4-2-7-6-11z"/></svg>
      <p>Paste any URL above — we'll judge it kindly. Mostly.</p>
    </div>

  </div>

  <footer class="footer">
    <div class="wrap">A peaceful corner of the internet — MintLife</div>
  </footer>
</main>

<script src="theme.js"></script>
<script src="toast.js"></script>
<script src="loader.js"></script>
<script src="auth.js"></script>
<script src="storage.js"></script>
<script src="nav.js"></script>
<script src="roast-engine.js"></script>
<script src="roast-my-website.js"></script>
</body>
</html>
